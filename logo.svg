<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 96" role="img" aria-label="Recreo">
  <title>Recreo</title>
  <!-- Hamaca + sol icon -->
  <g transform="translate(8,8)">
    <rect width="80" height="80" rx="16" fill="#4c111f"/>
    <!-- Sol -->
    <circle cx="40" cy="28" r="8" fill="none" stroke="#ffffff" stroke-width="3.2"/>
    <line x1="40" y1="14" x2="40" y2="18" stroke="#ffffff" stroke-width="3.2" stroke-linecap="round"/>
    <line x1="26" y1="28" x2="30" y2="28" stroke="#ffffff" stroke-width="3.2" stroke-linecap="round"/>
    <line x1="50" y1="28" x2="54" y2="28" stroke="#ffffff" stroke-width="3.2" stroke-linecap="round"/>
    <line x1="30" y1="18" x2="33" y2="21" stroke="#ffffff" stroke-width="3.2" stroke-linecap="round"/>
    <line x1="47" y1="21" x2="50" y2="18" stroke="#ffffff" stroke-width="3.2" stroke-linecap="round"/>
    <!-- Línea de anclaje -->
    <line x1="14" y1="50" x2="66" y2="50" stroke="#ffffff" stroke-width="3.2" stroke-linecap="round"/>
    <!-- Hamaca -->
    <path d="M14 50 Q40 74 66 50" fill="none" stroke="#e94e77" stroke-width="3.6" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <!-- Wordmark -->
  <text x="108" y="62" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="44" font-weight="700" fill="#4c111f" letter-spacing="1.5">Recreo</text>
</svg>
